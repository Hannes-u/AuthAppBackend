### mySql properties ###
# -> WHEN USING LOCAL MYSQL OR DOCKER CONTAINER THEN USE 'localhost' instead of 'mysql-db'
spring.datasource.url=jdbc:mysql://localhost:3306/userService
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


authApp.jwtExpirationMs= 3600000
# -> refresh token expires in 24 hours
authApp.jwtRefreshExpirationMs= 86400000